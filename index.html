            });

            // Προσθήκη Πολυγώνων
            coasts[coastName].polygons.forEach(poly => {
                let currentLatlngs = [];
                if (poly.coords) {
                    currentLatlngs = poly.coords;
                } else if (poly.coords_egsa) {
                    // Μετατροπή των συντεταγμένων από ΕΓΣΑ87 σε WGS84
                    currentLatlngs = poly.coords_egsa.map(pt => {
                        let wgs = proj4("EPSG:2100", "EPSG:4326", pt);
                        return [wgs[1], wgs[0]]; // Το Leaflet θέλει [Lat, Lon]
                    });
                }

                const polygon = L.polygon(currentLatlngs, {
                    color: "red",           // Ορίζουμε κόκκινο χρώμα περιγράμματος
                    fillColor: "red",       // Ορίζουμε κόκκινο χρώμα γεμίσματος
                    fillOpacity: currentFillOpacity, // Χρησιμοποιούμε τη μεταβλητή για τη διαφάνεια
                    weight: 2
                }).bindPopup(`
                    <div class="p-3 bg-white min-w-[200px]">
                        <h4 class="font-bold text-emerald-700 border-b pb-1 mb-1 border-emerald-100 flex items-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4h16v16H4z"></path></svg>
                            ${poly.coast}
                        </h4>
                        <p class="text-sm text-gray-600 mt-2">Όριο / Πολύγωνο Περιοχής</p>
                    </div>
                `);
                layerGroup.addLayer(polygon);
                polygonLayers.push(polygon); // Το βάζουμε στον πίνακα για μελλοντική χρήση
                currentLatlngs.forEach(coord => allBounds.push(coord));
            });
            
            // Δημιουργία της ετικέτας για το Legend (με χρωματιστή βούλα και ποσοστό)
            const colorDot = `<span style="color: ${coastColors[coastName] || '#888'}; font-size: 1.25em; vertical-align: text-bottom; margin-right: 2px;">●</span>`;
            const perc = percentages[coastName];
            const percHtml = (perc && perc !== "-") ? ` <span style="color: #6b7280; font-size: 0.85em; font-family: monospace;">(${perc})</span>` : "";
            const legendLabel = `${colorDot} ${coastName}${percHtml}`;

            overlayMaps[legendLabel] = layerGroup;
            layerGroup.addTo(map);
        });

        // Προσθήκη ελέγχων υποβάθρων & ακτών
        L.control.layers(baseMaps, overlayMaps, { collapsed: false }).addTo(map);

        // --- STREAMING_CHUNK: Setting up UI Controls and Events... ---
        // Προσθήκη Layer Παραλιακού Περιπάτου (Group για να πιάνει όλα τα τμήματα)
        const walkSettings = {
            color: '#00f2ff', // Electric Turquoise
            weight: 9, // Πολύ χοντρή γραμμή
            opacity: 0.9,
            lineCap: 'round',
            lineJoin: 'round'
        };
        const walkwayLayer1 = L.polyline(walkwayCoords1, walkSettings);
        const walkwayLayer2 = L.polyline(walkwayCoords2, walkSettings);
        
        // Ομαδοποιούμε τις γραμμές για να τις κρύβουμε / εμφανίζουμε μαζί
        const walkwayGroup = L.layerGroup([walkwayLayer1, walkwayLayer2]).addTo(map);

        if (allBounds.length > 0) {
            map.fitBounds(L.latLngBounds(allBounds).pad(0.1));
        }

        // --- Προσθήκη Κλίμακας (Scale) ---
        L.control.scale({ imperial: false, metric: true, position: 'bottomleft' }).addTo(map);

        // --- Προηγμένο Σύστημα Περιστροφής και UI Κουμπιών ---
        const customRotateControl = L.control({position: 'topleft'});
        customRotateControl.onAdd = function () {
            const div = L.DomUtil.create('div', 'leaflet-bar leaflet-control bg-white shadow-md rounded-md overflow-hidden flex flex-col items-center');
            div.style.pointerEvents = 'auto'; 
            L.DomEvent.disableClickPropagation(div);
            
            div.innerHTML = `
                <div class="p-1.5 bg-gray-50 border-b w-full flex flex-col justify-center items-center" title="Κατεύθυνση Βορρά">
                    <span class="text-[10px] text-gray-500 font-bold mb-1 uppercase tracking-wide">Βορρας</span>
                    <svg id="compass-icon" style="transition: transform 0.3s ease-out; transform: rotate(0deg);" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="12 2 19 21 12 17 5 21 12 2"></polygon>
                    </svg>
                </div>
                <div class="flex">
                    <button id="btn-rotate-left" title="Περιστροφή Αριστερά (-90°)" class="w-9 h-9 flex items-center justify-center hover:bg-gray-100 border-r text-gray-700 transition-colors">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
                    </button>
                    <button id="btn-rotate-right" title="Περιστροφή Δεξιά (+90°)" class="w-9 h-9 flex items-center justify-center hover:bg-gray-100 border-r text-gray-700 transition-colors">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path></svg>
                    </button>
                    <button id="btn-measure" title="Μέτρηση Απόστασης" class="w-9 h-9 flex items-center justify-center hover:bg-blue-50 hover:text-blue-600 border-r text-gray-700 transition-colors">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 1 0 2.829 2.828z"></path><path d="m18 10-2-2"></path><path d="m15 13-2-2"></path><path d="m12 16-2-2"></path></svg>
                    </button>
                    <button id="btn-locate" title="Το στίγμα μου" class="w-9 h-9 flex items-center justify-center hover:bg-blue-50 hover:text-blue-600 text-gray-700 transition-colors">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"></polygon></svg>
                    </button>
                </div>
                <!-- Control για Εμφάνιση Σημείων & Περιπάτου -->
                <div class="w-full p-2 bg-gray-50 border-t flex flex-col items-center gap-2">
                    <div class="flex space-x-3 w-full justify-center">
                        <label class="flex items-center space-x-1 text-[10px] text-gray-600 font-bold uppercase tracking-wide cursor-pointer" title="Εμφάνιση/Απόκρυψη Σημείων">
                            <input type="checkbox" id="toggle-points" checked class="w-3 h-3 accent-emerald-600 cursor-pointer">
                            <span>Σημεια</span>
                        </label>
                        <label class="flex items-center space-x-1 text-[10px] text-gray-600 font-bold uppercase tracking-wide cursor-pointer" title="Εμφάνιση/Απόκρυψη Περιπάτου">
                            <input type="checkbox" id="toggle-walkway" checked class="w-3 h-3 accent-cyan-400 cursor-pointer">
                            <span>Περιπατος</span>
                        </label>
                    </div>
                    <div class="w-full flex flex-col items-center mt-1">
                        <label for="opacity-slider" class="text-[10px] text-gray-500 font-bold mb-1 uppercase tracking-wide">Διαφάνεια Πολυγώνων</label>
                        <input type="range" id="opacity-slider" min="0" max="1" step="0.1" value="1" class="w-full h-1 bg-gray-200 rounded-lg appearance-none cursor-pointer">
                    </div>
                </div>
            `;
            return div;
        };
        customRotateControl.addTo(map);

        // Συνδέουμε τα events για τα κουμπιά μόλις προστεθούν στο DOM
        document.getElementById('btn-rotate-left').addEventListener('click', () => {
            const currentBearing = map.getBearing();
            map.setBearing(currentBearing - 90);
        });

        document.getElementById('btn-rotate-right').addEventListener('click', () => {
            const currentBearing = map.getBearing();
            map.setBearing(currentBearing + 90);
        });

        // Ενημερώνουμε την πυξίδα κάθε φορά που περιστρέφεται ο χάρτης
        map.on('rotate', function() {
            const bearing = map.getBearing();
            document.getElementById('compass-icon').style.transform = `rotate(${bearing}deg)`;
        });

        // Event listener για το slider της διαφάνειας
        document.getElementById('opacity-slider').addEventListener('input', function(e) {
            currentFillOpacity = parseFloat(e.target.value);
            polygonLayers.forEach(poly => {
                poly.setStyle({ fillOpacity: currentFillOpacity });
            });
        });

        // Toggle Σημείων Παρατήρησης
        document.getElementById('toggle-points').addEventListener('change', function(e) {
            if (e.target.checked) {
                document.getElementById('map').classList.remove('hide-markers');
            } else {
                document.getElementById('map').classList.add('hide-markers');
            }
        });

        // Toggle Παραλιακού Περιπάτου
        document.getElementById('toggle-walkway').addEventListener('change', function(e) {
            if (e.target.checked) {
                map.addLayer(walkwayGroup);
            } else {
                map.removeLayer(walkwayGroup);
            }
        });

        // --- STREAMING_CHUNK: Setting up Measurement and Geolocation logic... ---
        // Λογική Μέτρησης Απόστασης
        let isMeasuring = false;
        let measurePoints = [];
        let measureLine = null;
        let measureMarkers = [];

        function clearMeasurement() {
            if (measureLine) map.removeLayer(measureLine);
            measureMarkers.forEach(m => map.removeLayer(m));
            measureLine = null;
            measureMarkers = [];
            measurePoints = [];
        }

        document.getElementById('btn-measure').addEventListener('click', function() {
            isMeasuring = !isMeasuring;
            this.classList.toggle('bg-blue-100');
            this.classList.toggle('text-blue-700');
            
            if (isMeasuring) {
                document.getElementById('map').classList.add('measure-cursor');
                map.getContainer().style.cursor = 'crosshair';
            } else {
                document.getElementById('map').classList.remove('measure-cursor');
                map.getContainer().style.cursor = '';
                clearMeasurement();
            }
        });

        map.on('click', function(e) {
            if (!isMeasuring) return;
            
            if (measurePoints.length >= 2) {
                clearMeasurement();
            }
            
            measurePoints.push(e.latlng);
            
            const marker = L.circleMarker(e.latlng, {
                color: '#2563eb', radius: 4, fillColor: '#ffffff', fillOpacity: 1, weight: 2
            }).addTo(map);
            measureMarkers.push(marker);
            
            if (measurePoints.length === 2) {
                measureLine = L.polyline(measurePoints, { color: '#2563eb', weight: 3, dashArray: '5, 5' }).addTo(map);
                const distance = measurePoints[0].distanceTo(measurePoints[1]); // Απόσταση σε μέτρα
                
                const distText = distance > 1000 ? (distance/1000).toFixed(2) + ' km' : distance.toFixed(1) + ' m';
                
                measureLine.bindTooltip(`Απόσταση: ${distText}`, { 
                    permanent: true, 
                    direction: 'center', 
                    className: 'font-bold bg-white/90 px-2 py-1 rounded shadow-sm border border-blue-200 text-blue-800' 
                }).openTooltip();
            }
        });

        // --- Εντοπισμός Τοποθεσίας (Στίγμα) ---
        let userLocationMarker = null;
        let userLocationCircle = null;

        document.getElementById('btn-locate').addEventListener('click', function() {
            this.classList.add('text-blue-600', 'bg-blue-50'); // Οπτική ένδειξη ότι πατήθηκε
            map.locate({setView: true, maxZoom: 17, enableHighAccuracy: true});
        });

        // Όταν βρεθεί η τοποθεσία
        map.on('locationfound', function(e) {
            const radius = e.accuracy / 2;

            if (!userLocationMarker) {
                // Δημιουργία χαρακτηριστικής μπλε βούλας
                const blueDotIcon = L.divIcon({
                    className: 'user-location-pin',
                    html: `<div style="width: 16px; height: 16px; background-color: #2563eb; border: 2px solid white; border-radius: 50%; box-shadow: 0 0 10px rgba(37,99,235,0.8);"></div>`,
                    iconSize: [16, 16],
                    iconAnchor: [8, 8]
                });

                userLocationMarker = L.marker(e.latlng, {icon: blueDotIcon}).addTo(map)
                    .bindPopup("Η τοποθεσία σας (ακρίβεια " + radius.toFixed(0) + " μέτρα)");
                    
                userLocationCircle = L.circle(e.latlng, radius, {
                    color: '#3b82f6',
                    fillColor: '#3b82f6',
                    fillOpacity: 0.15,
                    weight: 1
                }).addTo(map);
            } else {
                userLocationMarker.setLatLng(e.latlng);
                userLocationCircle.setLatLng(e.latlng);
                userLocationCircle.setRadius(radius);
            }
            
            // Επαναφορά του στυλ του κουμπιού
            setTimeout(() => {
                document.getElementById('btn-locate').classList.remove('text-blue-600', 'bg-blue-50');
            }, 1000);
        });

        // Αν αποτύχει ο εντοπισμός
        map.on('locationerror', function(e) {
            const errorDiv = document.createElement('div');
            errorDiv.className = 'absolute top-4 left-1/2 transform -translate-x-1/2 bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg z-[2000] shadow-md transition-opacity duration-500 font-sans text-sm font-semibold';
            errorDiv.innerHTML = '<strong>Αδυναμία εύρεσης στίγματος.</strong> Ελέγξτε αν έχετε δώσει άδεια τοποθεσίας στον browser.';
            document.body.appendChild(errorDiv);
            
            setTimeout(() => {
                errorDiv.style.opacity = '0';
                setTimeout(() => errorDiv.remove(), 500);
            }, 4000); // Το μήνυμα εξαφανίζεται μετά από 4 δευτερόλεπτα
            
            document.getElementById('btn-locate').classList.remove('text-blue-600', 'bg-blue-50');
        });

        // --- STREAMING_CHUNK: Setting up Elevation System... ---
        // --- Σύστημα Εμφάνισης Συντεταγμένων & Υψομέτρου ---
        const coordsControl = L.control({ position: 'bottomright' });
        coordsControl.onAdd = function () {
            const div = L.DomUtil.create('div', 'bg-white/90 backdrop-blur px-3 py-2 rounded-lg shadow-md border border-gray-200 text-xs font-mono text-gray-700 pointer-events-none min-w-[160px]');
            div.innerHTML = `
                <div class="text-emerald-700 font-bold mb-1 border-b border-gray-200 pb-1">Κέρσορας (WGS84)</div>
                <div class="flex justify-between"><span>Φ (Lat):</span> <span id="cursor-lat" class="font-semibold">-</span></div>
                <div class="flex justify-between"><span>Λ (Lon):</span> <span id="cursor-lon" class="font-semibold">-</span></div>
                <div class="flex justify-between mt-1 pt-1 border-t border-gray-100 text-blue-700">
                    <span>Z (DEM):</span> <span id="cursor-z" class="font-semibold text-blue-800">-</span>
                </div>
            `;
            return div;
        };
        coordsControl.addTo(map);

        let elevationTimeout;
        map.on('mousemove', function(e) {
            // Παίρνουμε τις συντεταγμένες και τις στρογγυλοποιούμε στα 5 δεκαδικά
            const lat = e.latlng.lat.toFixed(5);
            const lng = e.latlng.lng.toFixed(5);
            
            document.getElementById('cursor-lat').innerText = lat + '°';
            document.getElementById('cursor-lon').innerText = lng + '°';
            const zElement = document.getElementById('cursor-z');
            
            // Ένδειξη φόρτωσης όσο κινείται το ποντίκι
            if (zElement.innerText !== 'Υπολογισμός...') {
                zElement.innerHTML = '<span class="text-gray-400 italic">Υπολογισμός...</span>';
            }

            // Καλούμε το API μόνο όταν σταματήσει το ποντίκι (Debounce)
            clearTimeout(elevationTimeout);
            elevationTimeout = setTimeout(() => {
                // Πρώτη προσπάθεια: OpenTopodata API (EU-DEM 25m - πολύ καλύτερη ανάλυση για Ευρώπη)
                fetch(`https://api.opentopodata.org/v1/eudem25m?locations=${lat},${lng}`)
                    .then(res => {
                        if (!res.ok) throw new Error('Network error');
                        return res.json();
                    })
                    .then(data => {
                        if (data && data.results && data.results.length > 0 && data.results[0].elevation !== null) {
                            let el = data.results[0].elevation;
                            // Προσθέτουμε μικρή ένδειξη στο UI για το ποιο DEM χρησιμοποιήθηκε
                            zElement.innerHTML = `${el.toFixed(1)} m <span class="text-[9px] text-gray-500 font-normal" title="European Digital Elevation Model 25m">(EU-DEM 25m)</span>`;
                        } else {
                            throw new Error('No data');
                        }
                    })
                    .catch(err => {
                        // Εφεδρική λύση: Αν αποτύχει/μπλοκάρει το OpenTopodata, πάμε στο Open-Meteo (90m ανάλυση)
                        fetch(`https://api.open-meteo.com/v1/elevation?latitude=${lat}&longitude=${lng}`)
                            .then(res => res.json())
                            .then(data => {
                                if (data && data.elevation && data.elevation.length > 0) {
                                    zElement.innerHTML = `${data.elevation[0].toFixed(1)} m <span class="text-[9px] text-gray-500 font-normal">(DEM 90m)</span>`;
                                } else {
                                    zElement.innerHTML = 'N/A';
                                }
                            })
                            .catch(err => {
                                zElement.innerHTML = '<span class="text-red-500">Σφάλμα API</span>';
                            });
                    });
            }, 800); // 800ms debounce για να μην υπερβούμε τα όρια του OpenTopodata API
        });

    </script>
</body>
</html>
